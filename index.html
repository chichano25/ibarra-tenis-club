<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Ibarra Tenis Club - Americana Pádel</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
body{font-family:Arial;margin:0;background:#0f172a;color:white}
.container{padding:20px;max-width:900px;margin:auto}
h1{margin-bottom:5px}
.version{position:fixed;bottom:10px;right:10px;background:#16a34a;padding:8px 12px;border-radius:10px;font-weight:900}
button{padding:10px;border:none;border-radius:8px;background:#2563eb;color:white;font-weight:bold;margin-top:10px}
input{padding:10px;border-radius:8px;border:none;width:100%;margin-top:5px}
.card{background:#1e293b;padding:15px;border-radius:12px;margin-top:15px}
</style>
</head>
<body>

<div class="container">
<h1>Ibarra Tenis Club</h1>
<p>Americana de Pádel</p>

<div class="card">
<input id="player" placeholder="Nombre jugador">
<button onclick="add()">Agregar</button>
<div id="list"></div>
<button onclick="start()">Iniciar Americana</button>
</div>

<div class="card" id="matches"></div>
</div>

<div class="version">CM-V7 LIVE</div>

<script>
let players=[]
let usedPairs={}

function add(){
 const name=document.getElementById('player').value.trim()
 if(!name) return
 players.push(name)
 document.getElementById('player').value=''
 render()
}

function render(){
 document.getElementById('list').innerHTML=players.map(p=>"<div>"+p+"</div>").join('')
}

function pairKey(a,b){
 return [a,b].sort().join('-')
}

function generate(){
 let shuffled=[...players].sort(()=>Math.random()-0.5)
 let pairs=[]
 for(let i=0;i<shuffled.length;i+=2){
  let a=shuffled[i]
  let b=shuffled[i+1]
  if(!b) continue
  let key=pairKey(a,b)
  if(usedPairs[key]) return null
  pairs.push([a,b])
 }
 return pairs
}

function start(){
 if(players.length!==4 && players.length!==8){
  alert("Solo 4 u 8 jugadores")
  return
 }
 let tries=0
 let pairs=null
 while(tries<100){
  pairs=generate()
  if(pairs) break
  tries++
 }
 if(!pairs){
  alert("No se pudo generar sin repetir parejas")
  return
 }
 pairs.forEach(p=>usedPairs[pairKey(p[0],p[1])]=true)
 renderMatches(pairs)
}

function renderMatches(pairs){
 let html=""
 for(let i=0;i<pairs.length;i+=2){
  if(pairs[i+1]){
   html+=`<div>${pairs[i][0]} / ${pairs[i][1]} vs ${pairs[i+1][0]} / ${pairs[i+1][1]}</div>`
  }
 }
 document.getElementById('matches').innerHTML=html
}
</script>

</body>
</html>
